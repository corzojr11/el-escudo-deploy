name: CI — EL ESCUDO Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pyjwt

      - name: Crear .env de prueba
        run: |
          cat > .env << 'EOF'
          SUPABASE_URL=https://test.supabase.co
          SUPABASE_KEY=test_key
          SUPABASE_JWT_SECRET=test_jwt_secret_at_least_32_characters_long
          GEMINI_API_KEY=test_key
          DEV_MODE=true
          EOF

      - name: Ejecutar tests con cobertura
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-omit=venv/*,tests/*

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar herramientas de lint
        run: pip install ruff

      - name: Verificar sintaxis Python
        run: |
          python -m py_compile main.py auth.py database.py
          echo "✅ Sintaxis OK"

      - name: Ruff lint (sin bloquear CI)
        run: ruff check . --exit-zero

  frontend-build:
    name: Frontend Build Verification
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: el-escudo-web

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: el-escudo-web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar build de producción
        run: npm run build

      - name: Verificar TypeScript
        run: npx tsc --noEmit
